<div class="flex flex-col gap-6 w-full">
  
  <!-- SKELETON PARA STORIES -->
  <div *ngIf="type === 'story'" class="flex gap-4 overflow-x-auto no-scrollbar py-4">
    <div *ngFor="let item of getItems()" class="flex flex-col items-center gap-1 min-w-[70px]">
      <div class="w-16 h-16 rounded-full skeleton-pulse bg-gray-200 dark:bg-slate-700"></div>
      <div class="w-12 h-2 skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded"></div>
    </div>
  </div>

  <!-- SKELETON PARA FEED -->
  <div *ngIf="type === 'feed'" class="flex flex-col gap-8">
    <div *ngFor="let item of getItems()" class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl overflow-hidden shadow-sm">
      <div class="p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-full skeleton-pulse bg-gray-200 dark:bg-slate-700"></div>
        <div class="flex flex-col gap-2">
          <div class="w-24 h-3 skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded"></div>
          <div class="w-16 h-2 skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded"></div>
        </div>
      </div>
      <div class="w-full aspect-square skeleton-pulse bg-gray-200 dark:bg-slate-700"></div>
      <div class="p-4 flex flex-col gap-3">
        <div class="flex gap-4">
          <div class="w-8 h-8 rounded-full skeleton-pulse bg-gray-200 dark:bg-slate-700"></div>
          <div class="w-8 h-8 rounded-full skeleton-pulse bg-gray-200 dark:bg-slate-700"></div>
        </div>
        <div class="w-full h-3 skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded"></div>
        <div class="w-2/3 h-3 skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded"></div>
      </div>
    </div>
  </div>

  <!-- SKELETON PARA GRID EXPLORAR -->
  <div *ngIf="type === 'grid'" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <div *ngFor="let item of getItems()" class="aspect-square skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded-lg"></div>
  </div>

  <!-- SKELETON PARA PERFIL -->
  <div *ngIf="type === 'profile'" class="max-w-4xl mx-auto w-full p-4">
    <div class="flex flex-col md:flex-row items-center gap-8 mb-10">
      <div class="w-32 h-32 md:w-40 md:h-40 rounded-full skeleton-pulse bg-gray-200 dark:bg-slate-700"></div>
      <div class="flex-1 flex flex-col gap-4">
        <div class="w-48 h-6 skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded"></div>
        <div class="flex gap-6">
          <div class="w-16 h-4 skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded"></div>
          <div class="w-16 h-4 skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded"></div>
          <div class="w-16 h-4 skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded"></div>
        </div>
        <div class="w-full h-4 skeleton-pulse bg-gray-200 dark:bg-slate-700 rounded"></div>
      </div>
    </div>
  </div>

</div>
