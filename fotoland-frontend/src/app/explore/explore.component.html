<div class="explore-page max-w-5xl mx-auto p-4 pt-10">

  <div class="flex border-b mb-6 overflow-x-auto no-scrollbar">
    <button (click)="activeTab = 'posts'" [class.border-blue-600]="activeTab === 'posts'" [class.text-blue-600]="activeTab === 'posts'" class="py-2 px-6 border-b-2 font-bold transition-all whitespace-nowrap">Posts</button>
    <button (click)="activeTab = 'users'" [class.border-blue-600]="activeTab === 'users'" [class.text-blue-600]="activeTab === 'users'" class="py-2 px-6 border-b-2 font-bold transition-all whitespace-nowrap">Buscar Nick</button>
    <button (click)="onLoadCatalog()" [class.border-blue-600]="activeTab === 'catalog'" [class.text-blue-600]="activeTab === 'catalog'" class="py-2 px-6 border-b-2 font-bold transition-all whitespace-nowrap">Catálogo (A-Z)</button>
  </div>

  <!-- Filtros (Posts e Busca Manual) -->
  <section class="card bg-white p-6 rounded-xl shadow-sm border mb-6" *ngIf="activeTab !== 'catalog'">
    <h2 class="text-xl font-bold mb-4">{{ activeTab === 'posts' ? 'Explorar Posts' : 'Buscar Usuários' }}</h2>
    
    <div class="filters flex flex-wrap gap-3" *ngIf="activeTab === 'posts'">
      <input type="text" class="flex-1 min-w-[200px] p-2 border rounded-lg" [placeholder]="'FEED.SEARCH_CAPTION' | translate" [(ngModel)]="search.q">
      <select class="p-2 border rounded-lg" [(ngModel)]="search.type">
        <option value="">{{ 'FEED.SEARCH_TYPE' | translate }}</option>
        <option value="PHOTO">{{ 'FEED.PHOTO' | translate }}</option>
        <option value="VIDEO">{{ 'FEED.VIDEO' | translate }}</option>
      </select>
      <input type="text" class="p-2 border rounded-lg" [placeholder]="'FEED.SEARCH_AUTHOR' | translate" [(ngModel)]="search.author">
      <button class="btn primary bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700" (click)="onSearch()">Buscar</button>
    </div>

    <div class="filters flex flex-col gap-3" *ngIf="activeTab === 'users'">
      <div class="flex gap-3">
        <input #userSearchInput type="text" class="flex-1 p-2 border rounded-lg" placeholder="Digite o nickname ou nome..." [(ngModel)]="userQuery" (input)="onUserQueryChange(userSearchInput.value)" (keyup.enter)="onSearchUsers()">
        <button class="btn primary bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700" (click)="onSearchUsers()">Buscar Nick</button>
      </div>
      <div *ngIf="userLoading" class="text-sm text-gray-500">Buscando usuários...</div>
    </div>
  </section>

  <!-- Título Catálogo -->
  <h2 class="text-xl font-bold mb-4 px-2" *ngIf="activeTab === 'catalog'">Todos os Membros (A-Z)</h2>

  <div class="loading text-center p-10" *ngIf="loading">
    <span class="text-gray-500 font-medium italic">Carregando lista...</span>
  </div>

  <section class="results" *ngIf="!loading">
    <div class="error bg-red-100 text-red-700 p-3 rounded-lg mb-4" *ngIf="error">{{ error }}</div>
    
    <!-- Grid de Posts -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" *ngIf="activeTab === 'posts'">
      <div class="post-card group relative bg-gray-100 rounded-lg overflow-hidden aspect-square shadow-sm" *ngFor="let post of results">
        <img [src]="authService.resolveMediaUrl(post.mediaUrl)" class="w-full h-full object-cover transition-transform group-hover:scale-105" alt="media">
        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-3 text-white">
          <span class="text-xs font-bold truncate">{{ post.caption }}</span>
          <span class="text-[10px] opacity-80 mb-2">{{ post.createdAt | date:'short' }}</span>
          <!-- Botão Admin para Moderar Posts -->
          <button *ngIf="isAdmin" class="bg-red-600/80 hover:bg-red-700 text-white text-[10px] font-bold py-1 px-2 rounded-md transition-colors" (click)="adminDeletePost(post.id)">Excluir (ADMIN)</button>
        </div>
      </div>
    </div>

    <!-- Lista de Usuários (Busca e Catálogo) -->
    <div class="user-results-grid" *ngIf="activeTab === 'users' || activeTab === 'catalog'">
      <div class="user-card-custom" *ngFor="let u of userResults">
        <div class="user-info-wrapper">
          <img [src]="authService.resolveMediaUrl(u.profilePictureUrl || '')" class="user-avatar" alt="avatar">
          <div class="user-details">
            <p class="user-name" [title]="u.fullName">{{ u.fullName }}</p>
            <p class="user-nick"><span>&#64;</span>{{ u.username }}</p>
          </div>
        </div>
        
        <div class="follow-btn-wrapper flex flex-col gap-2">
          <div class="follow-action flex items-center gap-2">
            <button *ngIf="!followingMap[u.username]" type="button"
              (click)="toggleFollow(u.username)"
              class="follow-btn-custom">
              {{ 'COMMON.FOLLOW' | translate }}
            </button>
            <button *ngIf="followingMap[u.username]" type="button" class="unfollow-btn" (click)="toggleFollow(u.username)">
              Deixar de seguir
            </button>
          </div>
          
          <!-- Botão Admin para Excluir Usuário -->
          <button *ngIf="isAdmin" type="button" (click)="adminDeleteUser(u.id)" class="text-[9px] text-red-600 font-bold hover:underline">
            DELETAR (ADMIN)
          </button>
        </div>
      </div>
      <p class="col-span-full text-center text-gray-500 italic py-10" *ngIf="userResults.length === 0 && activeTab === 'users' && userQuery">Nenhum usuário encontrado.</p>
      <p class="col-span-full text-center text-gray-500 italic py-10" *ngIf="userResults.length === 0 && activeTab === 'catalog'">O catálogo está vazio.</p>
    </div>
  </section>
</div>
