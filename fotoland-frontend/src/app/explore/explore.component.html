<div class="explore-page max-w-5xl mx-auto p-4">
  <app-nav-header [showChatNav]="false" [showCancel]="false" [showBack]="true"></app-nav-header>

  <div class="flex border-b mb-6">
    <button (click)="activeTab = 'posts'" [class.border-blue-600]="activeTab === 'posts'" [class.text-blue-600]="activeTab === 'posts'" class="py-2 px-6 border-b-2 font-bold transition-all">Posts</button>
    <button (click)="activeTab = 'users'" [class.border-blue-600]="activeTab === 'users'" [class.text-blue-600]="activeTab === 'users'" class="py-2 px-6 border-b-2 font-bold transition-all">Usuários (Nicks)</button>
  </div>

  <section class="card bg-white p-6 rounded-xl shadow-sm border mb-6">
    <h2 class="text-xl font-bold mb-4">{{ activeTab === 'posts' ? 'Explorar Posts' : 'Buscar Usuários' }}</h2>
    
    <!-- Filtros de Post -->
    <div class="filters flex flex-wrap gap-3" *ngIf="activeTab === 'posts'">
      <input type="text" class="flex-1 min-w-[200px] p-2 border rounded-lg" [placeholder]="'FEED.SEARCH_CAPTION' | translate" [(ngModel)]="search.q">
      <select class="p-2 border rounded-lg" [(ngModel)]="search.type">
        <option value="">{{ 'FEED.SEARCH_TYPE' | translate }}</option>
        <option value="PHOTO">{{ 'FEED.PHOTO' | translate }}</option>
        <option value="VIDEO">{{ 'FEED.VIDEO' | translate }}</option>
      </select>
      <input type="text" class="p-2 border rounded-lg" [placeholder]="'FEED.SEARCH_AUTHOR' | translate" [(ngModel)]="search.author">
      <button class="btn primary bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700" (click)="onSearch()">Buscar</button>
    </div>

    <!-- Filtro de Usuário -->
    <div class="filters flex gap-3" *ngIf="activeTab === 'users'">
      <input type="text" class="flex-1 p-2 border rounded-lg" placeholder="Digite o nickname ou nome..." [(ngModel)]="userQuery" (keyup.enter)="onSearchUsers()">
      <button class="btn primary bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700" (click)="onSearchUsers()">Buscar Nick</button>
    </div>
  </section>

  <div class="loading text-center p-10" *ngIf="loading">
    <span class="text-gray-500 font-medium italic">Buscando na rede Fotoland...</span>
  </div>

  <section class="results" *ngIf="!loading">
    <div class="error bg-red-100 text-red-700 p-3 rounded-lg mb-4" *ngIf="error">{{ error }}</div>
    
    <!-- Resultados de Posts -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" *ngIf="activeTab === 'posts'">
      <div class="post-card group relative bg-gray-100 rounded-lg overflow-hidden aspect-square shadow-sm" *ngFor="let post of results">
        <img [src]="authService.resolveMediaUrl(post.mediaUrl)" class="w-full h-full object-cover transition-transform group-hover:scale-105" alt="media">
        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-3 text-white">
          <span class="text-xs font-bold truncate">{{ post.caption }}</span>
          <span class="text-[10px] opacity-80">{{ post.createdAt | date:'short' }}</span>
        </div>
      </div>
    </div>

    <!-- Resultados de Usuários -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" *ngIf="activeTab === 'users'">
      <div class="user-card flex items-center justify-between p-4 bg-white border rounded-xl shadow-sm" *ngFor="let u of userResults">
        <div class="flex items-center gap-3">
          <img [src]="authService.resolveMediaUrl(u.profilePictureUrl || '')" class="w-12 h-12 rounded-full object-cover border">
          <div>
            <p class="font-bold text-gray-800">{{ u.fullName }}</p>
            <p class="text-xs text-gray-500"><span>&#64;</span>{{ u.username }}</p>
          </div>
        </div>
        <button (click)="toggleFollow(u.username)" 
          class="text-xs font-bold px-4 py-2 rounded-full border transition-all"
          [ngClass]="followingMap[u.username] ? 'bg-gray-100 text-gray-800 border-gray-300' : 'bg-blue-600 text-white border-blue-600'">
          {{ followingMap[u.username] ? 'Seguindo' : 'Seguir' }}
        </button>
      </div>
      <p class="col-span-full text-center text-gray-500 italic py-10" *ngIf="userResults.length === 0 && userQuery">Nenhum usuário encontrado com esse nick.</p>
    </div>
  </section>
</div>
