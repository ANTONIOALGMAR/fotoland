<app-nav-header
  [title]="isEditMode ? 'Editar Post' : 'Criar Post'"
  (navigatePrivate)="irParaPrivado()"
  (navigateGroup)="irParaColetivo()"
  (cancel)="cancelar()"
  (back)="voltar()"
></app-nav-header>

<div class="background-slideshow">
  <div class="slide" style="background-image: url('assets/futuristic-background.jpg');"></div>
  <div class="slide" style="background-image: url('assets/futuristic-background2.jpg');"></div>
  <div class="slide" style="background-image: url('assets/futuristic-background3.jpg');"></div>
</div>

<div class="create-post-container">
  <div class="create-post-form">
    <h2>Create New Post</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="album">Select Album</label>
        <select id="album" name="album" [(ngModel)]="selectedAlbumId" required>
          <option *ngFor="let album of albums" [value]="album.id">{{ album.title }} ({{ album.type }})</option>
        </select>
      </div>

      <div class="form-group">
        <label for="postType">Post Type</label>
        <select id="postType" name="postType" [(ngModel)]="post.type" required>
          <option *ngFor="let type of postTypes" [value]="type">{{ type }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="mediaFile">Media Files (Multiple)</label>
        <input type="file" id="mediaFile" (change)="onFilesSelected($event)" hidden #mediaFileInput multiple>
        <button type="button" class="btn-outline" (click)="mediaFileInput.click()">Choose Media Files</button>
        <div class="previews-grid flex flex-wrap gap-3 mt-3">
          <div *ngFor="let preview of mediaPreviews" class="preview-item">
            <img *ngIf="post.type === 'PHOTO'" [src]="preview" class="w-24 h-24 object-cover rounded-lg border-2 border-white shadow-md">
            <video *ngIf="post.type === 'VIDEO'" [src]="preview" class="w-24 h-24 object-cover rounded-lg border-2 border-white shadow-md"></video>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="caption">Caption</label>
        <textarea id="caption" name="caption" [(ngModel)]="post.caption"></textarea>
      </div>

      <button type="submit">Create Post</button>
    </form>
  </div>
</div>
