<div class="chat-container">
  <app-nav-header
    [title]="'Chat Privado'"
    [showChatNav]="true"
    [showPrivateNav]="false"
    [showGroupNav]="true"
    (navigatePrivate)="irParaPrivado()"
    (navigateGroup)="irParaColetivo()"
    (cancel)="cancelar()"
    (back)="voltar()"
  ></app-nav-header>

  <div class="chat-layout">
    <!-- Sidebar de Salas -->
    <aside class="rooms-sidebar">
      <div class="create-room">
        <input [(ngModel)]="newRoomName" placeholder="Nova sala...">
        <button (click)="createRoom()">+</button>
      </div>
      <div class="rooms-list">
        <div *ngFor="let r of rooms" 
             (click)="joinRoom(r.id)" 
             [class.active]="selectedRoomId === r.id"
             class="room-item">
          {{ r.room.name }}
        </div>
      </div>
    </aside>

    <!-- Área de Mensagens -->
    <main class="chat-main">
      <div class="chat-header" *ngIf="selectedRoomName">
        <h3>{{ selectedRoomName }}</h3>
        <div class="invite-box">
          <input [(ngModel)]="inviteUsername" placeholder="Nick do amigo...">
          <button (click)="invite()">Convidar</button>
        </div>
      </div>

      <div class="messages-container" #scrollMe>
        <div *ngFor="let msg of messages" class="message" [ngClass]="{'own-message': msg.sender === currentUsername}">
          <div class="message-body">
            <div class="message-header">
              <span class="username">{{ msg.sender }}</span>
              <span class="timestamp">{{ msg.timestamp | date:'dd/MM/yy HH:mm' }}</span>
            </div>

            <div class="message-content">
              <!-- Visualização -->
              <ng-container *ngIf="editingMessageId !== msg.id">
                <span class="text" *ngIf="!isImageUrl(msg.content)">{{ msg.content }}</span>
                <img [src]="auth.resolveMediaUrl(msg.content)" *ngIf="isImageUrl(msg.content)" class="max-w-[250px] rounded-lg mt-1 cursor-pointer hover:opacity-90">
              </ng-container>

              <!-- Edição -->
              <div *ngIf="editingMessageId === msg.id" class="edit-box">
                <input type="text" [(ngModel)]="editContent" (keyup.enter)="saveEdit(msg)" (keyup.esc)="cancelEdit()">
                <div class="edit-actions">
                  <button (click)="saveEdit(msg)">Salvar</button>
                  <button (click)="cancelEdit()">X</button>
                </div>
              </div>
            </div>

            <!-- Ações CRUD -->
            <div class="actions" *ngIf="canEdit(msg) && editingMessageId !== msg.id">
              <button (click)="startEdit(msg)" class="edit-btn">✏️</button>
              <button (click)="delete(msg)" class="delete-btn">🗑️</button>
            </div>
          </div>
        </div>
        <div *ngIf="connecting" class="connecting">Carregando mensagens...</div>
        <div *ngIf="!selectedRoomId" class="no-room">Selecione uma sala para conversar.</div>
      </div>

      <div class="input-container" *ngIf="selectedRoomId">
        <input type="file" #chatFileInput (change)="onChatFileSelected($event)" hidden accept="image/*">
        <button class="attach-btn" (click)="chatFileInput.click()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
          </svg>
        </button>
        <input [(ngModel)]="newMessage" (keyup.enter)="send()" placeholder="Sua mensagem...">
        <button (click)="send()">Enviar</button>
      </div>
    </main>
  </div>
</div>
