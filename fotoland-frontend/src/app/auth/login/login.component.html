<!-- Layout de login com fundo centralizado e slideshow futurista -->
<div class="background-slideshow"></div>

<!-- Seletor de Idioma no Login -->
<div class="fixed top-4 right-4 z-[100] bg-white/10 backdrop-blur-md px-3 py-1 rounded-full border border-white/20 flex gap-2">
  <button (click)="changeLang('pt')" [class.font-bold]="currentLang === 'pt'" class="text-xs text-white hover:text-emerald-400 transition-colors uppercase">PT</button>
  <span class="text-white/20 text-xs">|</span>
  <button (click)="changeLang('en')" [class.font-bold]="currentLang === 'en'" class="text-xs text-white hover:text-emerald-400 transition-colors uppercase">EN</button>
</div>

<div class="login-container">
  <div class="login-form">
    <h2>{{ 'AUTH.LOGIN_TITLE' | translate }}</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">{{ 'AUTH.USERNAME' | translate }}</label>
        <input type="text" id="username" name="username" [(ngModel)]="credentials.username" required placeholder="Digite seu usuário">
      </div>
      <div class="form-group">
        <label for="password">{{ 'AUTH.PASSWORD' | translate }}</label>
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" id="password" name="password" [(ngModel)]="credentials.password" autocomplete="current-password" required placeholder="Sua senha">
          <button type="button" class="btn-outline" (click)="toggleShowPassword()">
            {{ showPassword ? ('AUTH.HIDE' | translate) : ('AUTH.SHOW' | translate) }}
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? ('COMMON.LOADING' | translate) : ('AUTH.LOGIN_BUTTON' | translate) }}
      </button>

      <div class="loading-indicator" *ngIf="loading">
        <span class="spinner"></span>
      </div>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>
    <p class="register-link">
      {{ 'AUTH.NO_ACCOUNT' | translate }} 
      <a routerLink="/register">{{ 'AUTH.REGISTER_BUTTON' | translate }}</a>
    </p>
  </div>
</div>
