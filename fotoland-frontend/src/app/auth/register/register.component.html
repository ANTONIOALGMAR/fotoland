<app-nav-header
  [title]="'AUTH.REGISTER_TITLE' | translate"
  (navigatePrivate)="irParaPrivado()"
  (navigateGroup)="irParaColetivo()"
  (cancel)="cancelar()"
  (back)="voltar()"
></app-nav-header>
<div class="background-slideshow">
  <div class="slide" style="background-image: url('assets/futuristic-background.jpg');"></div>
  <div class="slide" style="background-image: url('assets/futuristic-background2.jpg');"></div>
  <div class="slide" style="background-image: url('assets/futuristic-background3.jpg');"></div>
</div>

<!-- Seletor de Idioma no Registro -->
<div class="fixed top-4 right-4 z-50 bg-white/20 backdrop-blur-md px-3 py-1 rounded-full border border-white/30 flex gap-2">
  <button type="button" (click)="changeLang('pt')" [class.font-bold]="currentLang === 'pt'" class="text-xs text-white hover:text-blue-200">PT</button>
  <span class="text-white/30 text-xs">|</span>
  <button type="button" (click)="changeLang('en')" [class.font-bold]="currentLang === 'en'" class="text-xs text-white hover:text-blue-200">EN</button>
</div>

<div class="register-container">
  <div class="register-form">
    <h2>{{ 'AUTH.REGISTER_TITLE' | translate }}</h2>
    <form (ngSubmit)="onSubmit()" #regForm="ngForm">
      <div class="form-group">
        <label for="fullName">{{ 'AUTH.FULL_NAME' | translate }}</label>
        <input type="text" id="fullName" name="fullName" [(ngModel)]="user.fullName" required autocomplete="name" [placeholder]="'AUTH.FULL_NAME' | translate">
      </div>
      <div class="form-group">
        <label for="username">{{ 'AUTH.USERNAME' | translate }}</label>
        <input type="text" id="username" name="username" [(ngModel)]="user.username" required minlength="3" autocomplete="username" [placeholder]="'AUTH.USERNAME' | translate">
      </div>
      <div class="form-group">
        <label for="email">{{ 'AUTH.EMAIL' | translate }}</label>
        <input type="email" id="email" name="email" [(ngModel)]="user.email" required autocomplete="email" placeholder="exemplo@dominio.com">
      </div>
      <div class="form-group">
        <label for="password">{{ 'AUTH.PASSWORD' | translate }}</label>
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" id="password" name="password" [(ngModel)]="user.password" autocomplete="new-password" required minlength="8" placeholder="Mínimo 8 caracteres">
          <button type="button" class="btn-outline" (click)="toggleShowPassword()">
            {{ showPassword ? ('AUTH.HIDE' | translate) : ('AUTH.SHOW' | translate) }}
          </button>
        </div>
      </div>
      <div class="form-group">
        <label for="phoneNumber">{{ 'AUTH.PHONE' | translate }}</label>
        <input type="text" id="phoneNumber" name="phoneNumber" [(ngModel)]="user.phoneNumber" autocomplete="tel" placeholder="+55 11 99999-9999">
      </div>
      <div class="form-group">
        <label for="cep">CEP</label>
        <input type="text" id="cep" name="cep" [(ngModel)]="user.cep" maxlength="9" placeholder="00000-000"
               (keydown.enter)="onCepLookup()" (keydown.tab)="onCepLookup()" (blur)="onCepLookup()">
      </div>
      <div class="form-group">
        <label for="address">{{ 'PROFILE.ADDRESS' | translate }}</label>
        <input type="text" id="address" name="address" [(ngModel)]="user.address" autocomplete="street-address" [placeholder]="'PROFILE.ADDRESS' | translate">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="form-group">
          <label for="houseNumber">{{ 'PROFILE.HOUSE_NUMBER' | translate }}</label>
          <input type="text" id="houseNumber" name="houseNumber" [(ngModel)]="user.houseNumber" [placeholder]="'PROFILE.HOUSE_NUMBER' | translate">
        </div>
        <div class="form-group">
          <label for="complement">{{ 'PROFILE.COMPLEMENT' | translate }}</label>
          <input type="text" id="complement" name="complement" [(ngModel)]="user.complement" [placeholder]="'PROFILE.COMPLEMENT' | translate">
        </div>
      </div>
      <div class="form-group">
        <label for="state">{{ 'PROFILE.STATE' | translate }}</label>
        <input type="text" id="state" name="state" [(ngModel)]="user.state" autocomplete="address-level1" placeholder="SP">
      </div>
      <div class="form-group">
        <label for="country">{{ 'PROFILE.COUNTRY' | translate }}</label>
        <input type="text" id="country" name="country" [(ngModel)]="user.country" autocomplete="country-name" [placeholder]="'PROFILE.COUNTRY' | translate">
      </div>
      <div class="form-group">
        <label for="profilePicture">{{ 'PROFILE.CHOOSE_IMAGE' | translate }}</label>
        <input type="file" id="profilePicture" (change)="onFileSelected($event)" hidden #profilePictureInput>
        <button type="button" class="btn-outline" (click)="profilePictureInput.click()">{{ 'PROFILE.CHOOSE_IMAGE' | translate }}</button>
        <div *ngIf="selectedFileName" class="file-info">
          <span>{{ selectedFileName }}</span>
          <img *ngIf="imagePreview" [src]="imagePreview" class="image-preview">
        </div>
      </div>
      <button type="submit" [disabled]="regForm.invalid || isSubmitting">{{ 'AUTH.REGISTER_BUTTON' | translate }}</button>
    </form>
    <p class="login-link">
      {{ 'AUTH.HAVE_ACCOUNT' | translate }} 
      <a routerLink="/login">{{ 'AUTH.LOGIN_BUTTON' | translate }}</a>
    </p>
  </div>
</div>
