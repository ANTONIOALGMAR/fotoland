services:
  postgres:
    image: postgres:latest
    container_name: fotoland-db
    environment:
      POSTGRES_DB: fotolanddb
      POSTGRES_USER: fotolanduser
      POSTGRES_PASSWORD: fotolandpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fotoland-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  rabbitmq_data:
